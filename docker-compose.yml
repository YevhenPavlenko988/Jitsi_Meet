networks:
  saas_network:
    external: true
    name: saas_network

services:
  jitsi-postgres:
    image: postgres:16-alpine
    container_name: jitsi_db
    environment:
      POSTGRES_DB: jitsi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - jitsi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - saas_network

  jitsi-meet:
    build:
      context: ..
      dockerfile: Jitsi_Meet/Dockerfile
    container_name: jitsi-meet
    ports:
      - "8083:8083"
    environment:
      JWT_SECRET: local-dev-secret-key-change-in-production-32ch
      JITSI_SERVER_URL: ${JITSI_SERVER_URL:-localhost:8443}
      JITSI_SERVER_PROTOCOL: ${JITSI_SERVER_PROTOCOL:-https}
      JITSI_XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      JITSI_USE_JWT: ${JITSI_USE_JWT:-true}
      # Load external_api.js over HTTP to avoid self-signed cert issues with Chrome
      JITSI_SCRIPT_ORIGIN: ${JITSI_SCRIPT_ORIGIN:-http://localhost:8088}
      JITSI_APP_ID: ${JITSI_APP_ID:-saas-teacher}
      JITSI_APP_SECRET: ${JITSI_APP_SECRET:-jitsi-local-dev-secret-change-in-prod}
      JITSI_ROOM_PREFIX: saas-
      DB_HOST: jitsi-postgres
      DB_PORT: 5432
      DB_NAME: jitsi_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      jitsi-postgres:
        condition: service_healthy
    networks:
      - saas_network

volumes:
  jitsi_postgres_data:
